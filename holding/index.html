<style>

  .brand strong { color: #fff; }
  h1 { font-size: clamp(1.9rem, 5vw, 2.9rem); line-height: 1.12; font-weight: 650; margin-bottom: 1rem; }
  p { font-size: 1.06rem; line-height: 1.6; color: #a9b6cf; }
  a { color: #9dc0ff; text-decoration: none; border-bottom: 1px solid rgba(157,192,255,.35); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#5b8cff; margin-right:.5rem; vertical-align: middle; }
  footer { margin-top: 2.5rem; font-size: .85rem; color: #63708c; }
</style>

  <div class="wrap">
